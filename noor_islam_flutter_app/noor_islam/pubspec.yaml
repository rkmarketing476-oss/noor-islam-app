name: noor_islam
description: A comprehensive, premium Islamic app — Quran, Prayer Times, Qibla, Dua, Tasbih & more.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # State Management
  provider: ^6.1.1

  # Islamic Core
  quran: ^1.3.1
  adhan: ^1.0.0+2
  hijri: ^2.0.1
  flutter_qiblah: ^2.0.2

  # UI & Fonts
  google_fonts: ^6.2.1

  # Device & Storage
  shared_preferences: ^2.2.3
  geolocator: ^11.0.0
  permission_handler: ^11.3.1
  vibration: ^1.9.0

  # Utils
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
